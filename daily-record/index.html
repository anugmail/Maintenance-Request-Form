<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>บันทึกการใช้งานรถ — Maintain-D</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#A80689">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="บันทึกรถ">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..600,0..1,0" rel="stylesheet">
<link rel="stylesheet" href="../design-system/tokens.css">
<link rel="stylesheet" href="../design-system/components.css">
<script src="../config.js"></script>
<script src="../config-daily.js"></script>
<script src="../ui-components.js"></script>
<style>
  /* ---------- เฉพาะแอปนี้ — ค่าสีมาจาก tokens เท่านั้น ---------- */
  body{background:var(--gray-50)}
  .aphdr{background:var(--grad-header);color:#fff;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));
    display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20}
  .aphdr .ttl2{flex:1}
  .aphdr h1{font-size:17px;font-weight:700;line-height:1.2}
  .aphdr .sub2{font-size:11.5px;opacity:.85}
  .aphdr a{color:#fff;text-decoration:none;display:flex}
  .amain{max-width:640px;margin:0 auto;padding:16px 16px calc(88px + env(safe-area-inset-bottom))}

  /* bottom tab bar */
  .tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-200);
    display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 6px;
    font-size:11px;color:var(--gray-500);cursor:pointer;user-select:none}
  .tab .ms{font-size:24px}
  .tab.on{color:var(--primary-600);font-weight:600}

  /* ปุ่มลอย "เพิ่มบันทึกเอง" — สำหรับกรอกย้อนหลังถ้าลืมบันทึกวันไหน (ไม่ใช่แค่ทำวันนี้ได้อย่างเดียว) */
  .fab{position:fixed;right:16px;bottom:calc(78px + env(safe-area-inset-bottom));width:56px;height:56px;
    border-radius:50%;background:var(--primary-600);color:#fff;border:none;display:flex;align-items:center;
    justify-content:center;box-shadow:0 6px 16px rgba(168,6,137,.4);cursor:pointer;z-index:25}
  .fab .ms{font-size:28px}
  .fab:active{background:var(--primary-700,#8A0570)}

  /* เลือกรถ: dropdown-card trigger + bottom sheet (แทน Fleet Card หน้าแรกเดิม) */
  .vtrigger{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--gray-300);border-radius:var(--r-sm);padding:11px 12px;cursor:pointer}
  .vtrigger .ms:first-child{color:var(--primary-600);font-size:22px;flex-shrink:0}
  .vtrigger .sp{flex:1;min-width:0}
  .vtrigger b{display:block;font-size:14.5px;color:var(--gray-900)}
  .vsheet-backdrop{position:fixed;inset:0;background:rgba(16,24,40,.45);z-index:40}
  .vsheet-panel{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:640px;background:#fff;
    border-radius:18px 18px 0 0;z-index:41;max-height:70vh;display:flex;flex-direction:column;box-shadow:0 -8px 30px rgba(16,24,40,.2)}
  .vsheet-handle{width:34px;height:4px;border-radius:4px;background:var(--gray-200);margin:10px auto 2px;flex-shrink:0}
  .vsheet-header{display:flex;align-items:center;justify-content:space-between;padding:6px 16px 10px;border-bottom:1px solid var(--gray-100);flex-shrink:0}
  .vsheet-header h3{font-size:15px;color:var(--gray-900);font-weight:600}
  .vsheet-list{overflow-y:auto;padding:14px}

  /* แถบ Fleet Card ประจำรถ (default ผูกกับรถ — เปลี่ยนบัตรได้แต่ต้องตั้งใจกดและระบุเหตุผล) */
  .fcband{display:flex;align-items:center;gap:10px;background:var(--primary-25);border:1px solid var(--primary-50);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:10px}
  .fcband .ms{color:var(--primary-600);font-size:20px;flex-shrink:0}
  .fcband .sp{flex:1;min-width:0}
  .fcband b{font-size:13.5px;color:var(--gray-900);display:block}
  .fclink{font-size:12px;color:var(--primary-600);font-weight:600;cursor:pointer;flex-shrink:0;text-decoration:underline;white-space:nowrap}

  /* วิธีจ่ายค่าน้ำมัน — default เป็น Fleet Card เสมอ (ส่วนใหญ่ใช้บัตร) ไม่ต้องเลือกทุกครั้ง
     "จ่ายเป็นเงินสดแทน" เป็นลิงก์เล็กๆ รองไว้ กดเฉพาะกรณีไม่มีบัตรจริงๆ */
  .fclink-muted{font-size:12px;color:var(--gray-400);text-decoration:underline;cursor:pointer}

  /* ถ่ายรูปสลิป — ปุ่มใหญ่แบบ dropzone เป็นแอ็กชันแรกที่เห็น กดง่ายกว่าไปหาในปุ่มเล็กท้ายฟอร์ม */
  .camera-cta{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    border:2px dashed var(--primary-300,var(--primary-500));border-radius:var(--r-lg);padding:28px 16px;
    cursor:pointer;background:var(--primary-25);margin-bottom:8px;color:var(--primary-600);text-align:center}
  .camera-cta .ms{font-size:36px}
  .camera-cta b{font-size:14.5px}
  .camera-cta .cta-sub{font-size:12px;color:var(--gray-500);font-weight:400}

  /* avatar (mock profile) — ใช้ทั้งหน้า login, header, และการ์ดรายวัน */
  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0}
  .avatar-sm{width:34px;height:34px;font-size:13px;cursor:pointer}

  /* หน้า login (mock) — เลือกโปรไฟล์คนขับ */
  .loginwrap{max-width:420px;margin:0 auto;padding:64px 20px;min-height:100dvh}
  .loginhead{text-align:center;margin-bottom:32px}
  .loginhead .ms{color:var(--primary-600);font-size:40px}
  .loginhead h1{font-size:19px;margin:12px 0 4px;color:var(--gray-900)}
  .profilelist{display:flex;flex-direction:column;gap:12px}
  .profilecard{display:flex;align-items:center;gap:14px;background:#fff;border:1.5px solid var(--gray-200);
    border-radius:var(--r-md);padding:14px;cursor:pointer}
  .profilecard:active{background:var(--gray-50)}
  .profilecard .avatar{width:48px;height:48px;font-size:16px}
  .profilecard .pname{font-size:15px;font-weight:600;color:var(--gray-900)}

  /* การ์ดรายวัน (feed หน้าแรก) — collapse/expand ทีละใบ */
  /* Feed แบ่งเป็น section ชัดเจน "วันนี้" กับ "ย้อนหลัง" — ไม่ใช้แค่สไตล์ขอบ
     เพราะผู้ใช้จริงหลายคนสูงอายุ/ไม่ถนัดเทคโนโลยี ต้องเห็นชัดโดยไม่ต้องสังเกตรายละเอียด */
  .feed-section{margin-bottom:22px}
  .feed-label{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:700;color:var(--primary-600);margin-bottom:10px}
  .feed-label .ms{font-size:20px}
  .feed-label.muted{color:var(--gray-500);font-size:13.5px;font-weight:700;margin-top:4px}
  .feed-label.muted .ms{font-size:17px;color:var(--gray-400)}

  .daycard{background:#fff;border:2px solid var(--gray-200);border-radius:var(--r-lg);margin-bottom:12px;overflow:hidden}
  .daycard.today{background:var(--primary-25);border-color:var(--primary-600);border-width:2.5px}
  .daycard.unfilled{border-style:dashed}
  .dc-head{display:flex;align-items:center;gap:12px;padding:16px 14px;cursor:pointer}
  .dc-info{flex:1;min-width:0}
  .dc-date{font-weight:700;font-size:16.5px;color:var(--gray-900);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .dc-sub{font-size:13px;color:var(--gray-600);margin-top:3px}
  .dc-right{text-align:right;flex-shrink:0}
  .dc-fuel{font-size:22px;font-weight:700;color:var(--gray-900)}
  .dc-right .badge{font-size:12.5px;padding:3px 11px;margin-top:3px;display:inline-block}
  .dc-chev{color:var(--gray-400);flex-shrink:0;font-size:26px}
  .dc-body{padding:0 16px 16px;border-top:1px solid var(--gray-100)}

  /* form — ทุกช่อง input/select เดี่ยวๆ กางเต็มความกว้าง (แถวที่แบ่งคอลัมน์เอง เช่น .rcgrid/.otrow จะ override ทับ) */
  input[type=number],input[type=date],input[type=text],input:not([type]),select{width:100%;border:1px solid var(--gray-300);border-radius:var(--r-sm);
    padding:10px 12px;font:inherit;color:var(--gray-900);background:#fff}
  .sumrow{display:flex;justify-content:space-between;gap:16px;padding:9px 0;border-bottom:1px dashed var(--gray-200);font-size:14px}
  .sumrow:last-child{border:none}
  .sumrow span:first-child{color:var(--gray-500);flex-shrink:0}
  .sumrow span:last-child{color:var(--gray-900);font-weight:500;text-align:right}
  .f em{color:var(--error-600);font-style:normal}
  .odorow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .distline{font-size:13px;color:var(--gray-600);margin:-6px 0 12px}
  .distline.err{color:var(--error-600);font-weight:600}
  .formbtns{display:flex;gap:10px;margin-top:18px}
  .formbtns .btn{flex:1;padding:12px}
  .chkrow{display:flex!important;gap:10px;align-items:center;font-weight:600}
  .f{margin-bottom:14px}

  /* receipts */
  .rccard{border:1px solid var(--gray-200);border-radius:var(--r-md);padding:12px;margin-bottom:10px;background:#fff}
  .rcrow{display:flex;gap:12px;align-items:flex-start}
  .rthumb{width:84px;height:84px;border-radius:10px;object-fit:cover;background:var(--gray-100);flex-shrink:0}
  .rthumb-ph{display:flex;align-items:center;justify-content:center;color:var(--gray-400)}
  .scanwrap{position:relative;flex-shrink:0;border-radius:10px;overflow:hidden}
  .scanline{position:absolute;left:0;right:0;height:3px;background:var(--primary-500);box-shadow:0 0 14px 3px var(--primary-500);animation:scan 1.1s ease-in-out infinite}
  @keyframes scan{0%{top:6%}50%{top:88%}100%{top:6%}}
  .scantxt{display:flex;gap:8px;align-items:center;color:var(--primary-600);font-weight:600;font-size:14px;min-height:84px}
  .spin{animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .rcgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
  .rcgrid .sp2{grid-column:1/-1}
  .rcgrid label{font-size:11.5px;color:var(--gray-500);display:block;margin-bottom:3px;font-weight:500}
  .rcgrid input,.rcgrid select{padding:8px 10px;font-size:14px}
  .rcdel{color:var(--gray-400);cursor:pointer;flex-shrink:0}
  .flash input,.flash select{animation:flash 1.4s ease-out}
  @keyframes flash{0%{background:var(--primary-50);border-color:var(--primary-500)}100%{background:#fff}}
  .rcbtns{display:flex;gap:8px;flex-wrap:wrap}
  .rcbtns .btn{padding:9px 14px;font-size:13.5px}

  /* others repeater */
  .otrow{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .otrow select{flex:0 0 118px;padding:9px 8px}
  .otrow input{padding:9px 10px}
  .otrow .amt{flex:0 0 96px}

  /* month summary */
  .mnav{display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .mnav b{flex:1;text-align:center;font-size:16px;color:var(--gray-900)}
  .mnav .ms{cursor:pointer;color:var(--primary-600);font-size:26px}
  .statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .stt{background:var(--gray-50);border:1px solid var(--gray-100);border-radius:var(--r-md);padding:9px 6px;text-align:center}
  .stt b{display:block;font-size:16px;color:var(--gray-900)}
  .stt span{font-size:11px;color:var(--gray-500)}
  .barrow{display:flex;gap:10px;align-items:center;margin-top:8px;font-size:12.5px}
  .barrow .lbl{flex:0 0 84px;color:var(--gray-700)}
  .barwrap{flex:1;background:var(--gray-100);border-radius:6px;height:22px;overflow:hidden}
  .bar{height:100%;background:var(--primary-600);border-radius:6px;min-width:3px}
  .barrow .val{flex:0 0 76px;text-align:right;font-weight:600;color:var(--gray-900)}
</style>
</head>
<body>

<div class="aphdr hidden" id="aphdr">
  <span class="ms" style="font-size:26px">local_gas_station</span>
  <div class="ttl2">
    <h1>บันทึกการใช้งานรถ</h1>
    <div class="sub2" id="hdrSub">บันทึกรายวันแบบ logbook — ข้อมูลจำลอง (mock)</div>
  </div>
  <div class="avatar avatar-sm" id="hdrAvatar" onclick="doLogout()" title="สลับผู้ใช้"></div>
  <a href="../admin-config.html" title="ตั้งค่า (Admin Control Panel)"><span class="ms" style="font-size:24px">tune</span></a>
</div>

<div id="loginScreen" class="hidden"></div>

<div class="amain hidden" id="amainWrap">
  <section id="view-form"></section>
  <section id="view-month" class="hidden"></section>
</div>

<button class="fab hidden" id="fabAdd" onclick="openAddSheet()" title="เพิ่มบันทึกเอง (ย้อนหลังได้)"><span class="ms">add</span></button>

<nav class="tabbar hidden" id="tabbar">
  <div class="tab on" id="tab-form" onclick="go('form')"><span class="ms">edit_note</span><span>บันทึก</span></div>
  <div class="tab" id="tab-month" onclick="go('month')"><span class="ms">bar_chart</span><span>สรุปเดือน</span></div>
</nav>

<div class="toast" id="toast"></div>
<input type="file" id="rcfile" accept="image/*" capture="environment" class="hidden">
<div id="vsheetRoot"></div>
<div id="addSheetRoot"></div>

<script src="ocr.js"></script>
<script src="app.js"></script>
</body>
</html>
